<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fffde7;
            font-family: 'Quicksand', sans-serif;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            border: 5px solid #fbc02d;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }

        .icon { font-size: 60px; margin-bottom: 10px; }
        
        h1 { color: #f57f17; font-size: 30px; margin-bottom: 5px; font-weight: 700; }
        .details { color: #555; font-size: 22px; font-weight: 700; margin: 20px 0; }
        p { color: #333; font-size: 20px; line-height: 1.6; font-weight: 600; }
        
        .btn-box { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }

        button {
            padding: 12px 35px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        #yesBtn { background: #fbc02d; color: #fff; }
        #yesBtn:hover { background: #f57f17; }
        
        #noBtn { background: #eee; color: #777; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">🎓</div>
    <h1>Toy Story 5</h1>
    <p>"I knew it, I knew you!"</p>
    <div class="details">
        June 23rd 
    </div>
    <p>You and me, movie night?</p>
    
    <div class="btn-box">
        <button id="yesBtn" onclick="alert('Yay! Get ready for the best night ever! ❤️')">Yes!</button>
        <button id="noBtn" onmouseover="runAway()">No</button>
    </div>
</div>

<script>
    function runAway() {
        const btn = document.getElementById('noBtn');
        btn.style.position = 'fixed';
        const newX = Math.random() * (window.innerWidth - 100);
        const newY = Math.random() * (window.innerHeight - 50);
        btn.style.left = newX + 'px';
        btn.style.top = newY + 'px';
    }
</script>

</body>
</html>
